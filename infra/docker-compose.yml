# VidyAI local dev stack
# Supabase (Postgres + Auth + Storage + Realtime) is managed separately via Supabase CLI
# Run: supabase start    → starts Postgres on port 54322
# Run: docker compose up → starts auxiliary services below

services:
  redis:
    image: redis:7-alpine
    container_name: vidyai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vidyai-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: vidyai
      RABBITMQ_DEFAULT_PASS: vidyai_dev
      RABBITMQ_DEFAULT_VHOST: vidyai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: vidyai-network
